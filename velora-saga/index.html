<head>

<style>

<body>
<div id="wrap"><canvas id="game" width="480" height="320"></canvas></div>
<div id="hint">Pfeiltasten/WASD bewegen · X/Shift halten = rennen · Leertaste/Enter bestätigen · ESC Menü</div>

  <div class="tbtn" id="t-left"  style="left:10px;bottom:90px;width:60px;height:60px;">◀</div>
  <div class="tbtn" id="t-right" style="left:130px;bottom:90px;width:60px;height:60px;">▶</div>
  <div class="tbtn" id="t-a" style="right:20px;bottom:40px;width:74px;height:74px;">A</div>
  <div class="tbtn" id="t-b" style="right:110px;bottom:90px;width:64px;height:64px;">B</div>
  <div class="tbtn" id="t-m" style="right:20px;top:20px;width:54px;height:44px;font-size:13px;">MENÜ</div>

<script>
"use strict";
/* =========================================================================
   VELORA SAGA — ein eigenständiges Monster-Sammel-RPG (Canvas, ohne Abhängigkeiten)
   Alle Namen, Wesen, Orte, Begriffe sind frei erfunden.
   ========================================================================= */

const CANVAS = document.getElementById('game');
const CTX = CANVAS.getContext('2d');
CTX.imageSmoothingEnabled = false;
const VW = 480, VH = 320, TILE = 16;

/* ---- Skalierung an Fenster anpassen ---- */
function resize(){
  const s = Math.max(1, Math.min(Math.floor(window.innerWidth/VW), Math.floor(window.innerHeight/VH)));
  CANVAS.style.width  = (VW*s)+'px';
  CANVAS.style.height = (VH*s)+'px';
}
window.addEventListener('resize', resize); resize();

/* =========================================================================
   BILD-ASSETS — generierte, stilkonsistente 16-bit-Pixel-Art (assets/)
   Sprites werden mit transparentem Hintergrund geladen; falls eine Datei
   fehlt, fällt das Spiel automatisch auf die prozeduralen Sprites zurück.
   ========================================================================= */
// Wesen-Schlüssel -> Dateiname (Umlaute werden in den Dateinamen aufgelöst)
const CREATURE_FILE = {
  'sprossknu':'sprossknu','florant':'florant','glutfox':'glutfox','pyrolux':'pyrolux',
  'tröpflin':'troepflin','aqualon':'aqualon','muffel':'muffel','muffrat':'muffrat',
  'piepser':'piepser','schwingfalk':'schwingfalk','zappel':'zappel','voltik':'voltik',
  'klumpf':'klumpf','felsbrocker':'felsbrocker','aschling':'aschling','blattling':'blattling',
  'nachtflatter':'nachtflatter','kristallit':'kristallit'
};
const IMG = {};
let assetsTotal = 0, assetsLoaded = 0;
function loadImg(key, path){
  assetsTotal++;
  const im = new Image();
  im.onload  = ()=>{ assetsLoaded++; };
  im.onerror = ()=>{ assetsLoaded++; }; // fehlende Datei zählt als „fertig" (Fallback greift)
  im.src = path;
  IMG[key] = im;
}
function imgReady(key){ const im=IMG[key]; return !!(im && im.complete && im.naturalWidth>0); }
function loadAllAssets(){
  for(const k in CREATURE_FILE) loadImg('cre_'+k, 'assets/creatures/'+CREATURE_FILE[k]+'.png');
  loadImg('bg_grass','assets/bg/battle_grass.png');
  loadImg('bg_cave', 'assets/bg/battle_cave.png');
  loadImg('bg_boss', 'assets/bg/battle_boss.png');
  loadImg('t_grass','assets/tiles/grass.png');
  loadImg('t_path', 'assets/tiles/path.png');
  loadImg('t_water','assets/tiles/water.png');
  loadImg('t_cave', 'assets/tiles/cave.png');
}
function assetsReady(){ return assetsTotal===0 || assetsLoaded>=assetsTotal; }
function drawLoading(){
  CTX.fillStyle='#12152a'; CTX.fillRect(0,0,VW,VH);
  CTX.font='bold 22px monospace'; CTX.textBaseline='top'; CTX.textAlign='center';
  CTX.fillStyle='#ffe45a'; CTX.fillText('VELORA SAGA', VW/2, 110);
  CTX.font='10px monospace'; CTX.fillStyle='#cfe'; CTX.fillText('Lade Grafiken …', VW/2, 150);
  CTX.textAlign='left';
  const bw=240, bx=(VW-bw)/2, by=172, p=assetsTotal? assetsLoaded/assetsTotal : 1;
  CTX.fillStyle='#0d1228'; CTX.fillRect(bx-2,by-2,bw+4,12);
  CTX.fillStyle='#e8e0c0'; CTX.fillRect(bx-1,by-1,bw+2,10);
  CTX.fillStyle='#2a2f5a'; CTX.fillRect(bx,by,bw,8);
  CTX.fillStyle='#7ad0ff'; CTX.fillRect(bx,by,Math.round(bw*p),8);
}

/* =========================================================================
   EINGABE
   ========================================================================= */
const Keys = { up:false, down:false, left:false, right:false, a:false, b:false, menu:false };
const Pressed = {}; // einmalige Tastendrücke (für Menüs)
const KEYMAP = {
  ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
  KeyW:'up', KeyS:'down', KeyA:'left', KeyD:'right',
  Space:'a', Enter:'a', KeyZ:'a', KeyJ:'a',
  KeyX:'b', KeyK:'b', Backspace:'b', ShiftLeft:'b',
  Escape:'menu', KeyM:'menu'
};
window.addEventListener('keydown', e=>{
  const k = KEYMAP[e.code];
  if(k){ e.preventDefault(); if(!Keys[k]) Pressed[k]=true; Keys[k]=true; }
});
window.addEventListener('keyup', e=>{
  const k = KEYMAP[e.code];
  if(k){ e.preventDefault(); Keys[k]=false; }
});
function consume(k){ if(Pressed[k]){ Pressed[k]=false; return true; } return false; }
function clearPressed(){ for(const k in Pressed) Pressed[k]=false; }

/* Touch-Steuerung */
(function(){
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
  if(!isTouch) return;
  document.getElementById('touch').style.display='block';
  document.getElementById('hint').style.display='none';
  const bind=(id,key)=>{
    const el=document.getElementById(id);
    const on=e=>{e.preventDefault(); if(!Keys[key])Pressed[key]=true; Keys[key]=true;};
    const off=e=>{e.preventDefault(); Keys[key]=false;};
    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('touchcancel',off,{passive:false});
  };
  bind('t-up','up'); bind('t-down','down'); bind('t-left','left'); bind('t-right','right');
  bind('t-a','a'); bind('t-b','b'); bind('t-m','menu');
})();

/* =========================================================================
   AUDIO — kleine Chiptune-Engine (WebAudio), keine externen Dateien
   ========================================================================= */
const Audio2 = (function(){
  let ctx=null, master=null, musicGain=null, sfxGain=null;
  let enabled=true, curTrack=null, seq=null, seqTimer=null, step=0;
  function ensure(){
    if(ctx) return;
    try{
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      master = ctx.createGain(); master.gain.value=0.5; master.connect(ctx.destination);
      musicGain = ctx.createGain(); musicGain.gain.value=0.35; musicGain.connect(master);
      sfxGain = ctx.createGain(); sfxGain.gain.value=0.6; sfxGain.connect(master);
    }catch(e){ enabled=false; }
  }
  function resume(){ ensure(); if(ctx && ctx.state==='suspended') ctx.resume(); }
  function note(freq,dur,type,gainNode,vol){
    if(!ctx||!enabled) return;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(vol||0.3, ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+dur);
    o.connect(g); g.connect(gainNode||sfxGain);
    o.start(); o.stop(ctx.currentTime+dur+0.02);
  }
  // Notenfrequenzen
  const N = {C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,
             C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,
             C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880,r:0};
  const TRACKS = {
    overworld:{ tempo:150, lead:['E4','G4','C5','G4','A4','C5','E5','C5','D5','B4','G4','B4','C5','G4','E4','G4'],
                bass:['C3','C3','G3','G3','A3','A3','F3','F3'] },
    town:{ tempo:130, lead:['C5','E5','G4','E5','F5','A4','F5','D5','E5','C5','G4','E4','C4','E4','G4','C5'],
           bass:['C3','C3','F3','F3','G3','G3','C3','C3'] },
    battle:{ tempo:180, lead:['A4','A4','E5','A4','C5','A4','E5','G5','F5','F5','C5','F5','E5','C5','A4','E5'],
             bass:['A3','A3','A3','A3','F3','F3','G3','G3'] },
    boss:{ tempo:165, lead:['D4','F4','A4','D5','C5','A4','F4','A4','G4','B4','D5','G5','F5','D5','A4','D5'],
           bass:['D3','D3','D3','D3','A3','A3','G3','G3'] },
    cave:{ tempo:110, lead:['A4','r','C5','r','E5','r','C5','r','G4','r','B4','r','D5','r','B4','r'],
           bass:['A3','A3','E3','E3','F3','F3','E3','E3'] },
    victory:{ tempo:150, lead:['C5','C5','C5','C5','G4','A4','C5','r','C5','G4','C5','r'],
              bass:['C3','C3','G3','G3'] }
  };
  function play(name){
    ensure(); if(!ctx||!enabled){ curTrack=name; return; }
    if(curTrack===name && seqTimer) return;
    stop(); curTrack=name; seq=TRACKS[name]; if(!seq) return;
    step=0; const beat=60/seq.tempo*1000/2;
    seqTimer=setInterval(()=>{
      if(!enabled||!seq) return;
      const l=seq.lead[step%seq.lead.length]; const b=seq.bass[Math.floor(step/2)%seq.bass.length];
      if(l&&l!=='r') note(N[l]||440, beat/1000*0.9, 'square', musicGain, 0.22);
      if(step%2===0 && b) note((N[b]||110)/1, beat/1000*1.6,'triangle',musicGain,0.30);
      step++;
    }, beat);
  }
  function stop(){ if(seqTimer){clearInterval(seqTimer); seqTimer=null;} }
  // SFX
  function sfx(kind){
    ensure(); if(!ctx||!enabled) return;
    if(kind==='select'){ note(660,0.06,'square',sfxGain,0.3); }
    else if(kind==='confirm'){ note(523,0.05,'square',sfxGain,0.3); setTimeout(()=>note(784,0.08,'square',sfxGain,0.3),50); }
    else if(kind==='cancel'){ note(330,0.08,'square',sfxGain,0.3); }
    else if(kind==='hit'){ note(180,0.12,'sawtooth',sfxGain,0.35); }
    else if(kind==='superhit'){ note(140,0.18,'sawtooth',sfxGain,0.4); setTimeout(()=>note(90,0.16,'sawtooth',sfxGain,0.35),60); }
    else if(kind==='faint'){ note(400,0.1,'square',sfxGain,0.3); setTimeout(()=>note(200,0.25,'square',sfxGain,0.3),90); }
    else if(kind==='heal'){ note(523,0.08,'sine',sfxGain,0.3); setTimeout(()=>note(659,0.08,'sine',sfxGain,0.3),80); setTimeout(()=>note(784,0.12,'sine',sfxGain,0.3),160); }
    else if(kind==='levelup'){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>note(f,0.1,'square',sfxGain,0.3),i*70)); }
    else if(kind==='catch'){ note(660,0.07,'square',sfxGain,0.3); setTimeout(()=>note(440,0.07,'square',sfxGain,0.3),120); setTimeout(()=>note(550,0.07,'square',sfxGain,0.3),240); }
    else if(kind==='caught'){ [523,659,784,659,784,1046].forEach((f,i)=>setTimeout(()=>note(f,0.1,'square',sfxGain,0.3),i*90)); }
    else if(kind==='evolve'){ [392,440,523,587,659,784].forEach((f,i)=>setTimeout(()=>note(f,0.12,'sine',sfxGain,0.3),i*100)); }
    else if(kind==='bump'){ note(120,0.05,'square',sfxGain,0.2); }
  }
  function toggle(){ enabled=!enabled; if(!enabled) stop(); else if(curTrack) play(curTrack); return enabled; }
  return { play, stop, sfx, resume, toggle, isOn:()=>enabled };
})();
window.addEventListener('keydown', ()=>Audio2.resume(), {once:true});
window.addEventListener('touchstart', ()=>Audio2.resume(), {once:true});

/* =========================================================================
   DATEN: TYPEN & EFFEKTIVITÄT
   ========================================================================= */
const TYPES = ['Normal','Pflanze','Feuer','Wasser','Elektro','Gestein','Flug'];
const TYPE_COLORS = {
  Normal:'#b8b0a0', Pflanze:'#5fbb52', Feuer:'#e0623a', Wasser:'#4a90d9',
  Elektro:'#e6c233', Gestein:'#a08a5a', Flug:'#9ab8e0'
};
// Effektivität: TE[angreifer][verteidiger] = multiplikator
const TE = {
  Normal:  {Gestein:0.5},
  Pflanze: {Wasser:2, Gestein:2, Feuer:0.5, Pflanze:0.5, Flug:0.5},
  Feuer:   {Pflanze:2, Gestein:0.5, Feuer:0.5, Wasser:0.5},
  Wasser:  {Feuer:2, Gestein:2, Pflanze:0.5, Wasser:0.5, Elektro:0.5},
  Elektro: {Wasser:2, Flug:2, Gestein:0.5, Pflanze:0.5},
  Gestein: {Feuer:2, Flug:2, Wasser:0.5, Pflanze:0.5},
  Flug:    {Pflanze:2, Elektro:0.5, Gestein:0.5}
};
function typeEff(atkType, defType){
  if(!atkType||!defType) return 1;
  const row = TE[atkType]; if(!row) return 1;
  return (defType in row) ? row[defType] : 1;
}

/* =========================================================================

   ========================================================================= */
function rnd(n){ return Math.floor(Math.random()*n); }
function rndRange(a,b){ return a + Math.random()*(b-a); }
function choice(arr){ return arr[rnd(arr.length)]; }
function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }
function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }

// Erschafft eine Wesen-Instanz aus Art + Level
function makeCreature(speciesKey, level){
  const sp = SPECIES[speciesKey];
  const inst = {
    species:speciesKey, name:sp.name, level:level,
    exp: level*level*level,
    stats:{}, hp:0, maxhp:0, status:null, sleepTurns:0, moves:[]
  };
  computeStats(inst);
  inst.hp = inst.maxhp;
  // erlernte Attacken bis Level (letzte 4)
  const learned = sp.learn.filter(m=>m[0]<=level).map(m=>m[1]);
  const uniq=[]; for(let i=learned.length-1;i>=0 && uniq.length<4;i--){ if(!uniq.includes(learned[i])) uniq.unshift(learned[i]); }
  inst.moves = uniq.map(k=>({key:k, pp:MOVES[k].pp, maxpp:MOVES[k].pp}));
  if(inst.moves.length===0) inst.moves=[{key:'rempler',pp:35,maxpp:35}];
  return inst;
}
function computeStats(inst){
  const sp = SPECIES[inst.species]; const L=inst.level; const b=sp.base;
  inst.stats.atk = Math.floor(b.atk*2*L/100)+5;
  inst.stats.def = Math.floor(b.def*2*L/100)+5;
  inst.stats.spd = Math.floor(b.spd*2*L/100)+5;
  const newMax = Math.floor(b.hp*2*L/100)+L+10;
  inst.maxhp = newMax;
}
function expForLevel(L){ return L*L*L; }

   PIXEL-ART: prozedurale Wesen-Sprites
   ========================================================================= */
const spriteCache = {};
function shade(hex, amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=clamp(Math.round(r+amt),0,255); g=clamp(Math.round(g+amt),0,255); b=clamp(Math.round(b+amt),0,255);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
// deterministischer RNG aus Seed
function seeded(seed){ let s=seed%2147483647; if(s<=0)s+=2147483646; return ()=>{ s=s*16807%2147483647; return (s-1)/2147483646; }; }
function makeCreatureSprite(speciesKey){
  if(spriteCache[speciesKey]) return spriteCache[speciesKey];
  const sp = SPECIES[speciesKey];
  const G=16; // 16x16 pixel-grid
  const cv=document.createElement('canvas'); cv.width=G; cv.height=G;
  const c=cv.getContext('2d');
  const base = TYPE_COLORS[sp.type];
  const dark = shade(base,-50), light=shade(base,50), eye='#222', white='#fff';
  const rng = seeded(sp.id*9973+17);
  // Körper als symmetrische Blob-Form
  const grid = []; for(let y=0;y<G;y++) grid.push(new Array(G).fill(0));
  // Grundkörper: Ellipse
  const cx=8, cy=9, rw=4+Math.round(rng()*1.5), rh=4+Math.round(rng()*1.5);
  for(let y=0;y<G;y++)for(let x=0;x<8;x++){
    const dx=(x-cx)/rw, dy=(y-cy)/rh;
    if(dx*dx+dy*dy<=1.0){ grid[y][x]=1; }
  }
  // Kopf-/Ohren-Variation
  const earType = sp.id%4;
  if(earType===0){ grid[3][5]=1; grid[2][5]=1; grid[3][6]=1; } // ein Ohr/Spitze
  else if(earType===1){ grid[4][4]=1; grid[3][4]=1; }
  else if(earType===2){ grid[3][3]=1; grid[4][3]=1; grid[5][3]=1; } // langes Ohr
  // Füße
  grid[14][4]=1; grid[14][5]=1; grid[13][4]=1;
  // Schweif/Flügel je nach typ
  if(sp.type==='Flug'){ grid[8][2]=2; grid[9][1]=2; grid[7][2]=2; grid[10][2]=2; }
  if(sp.type==='Feuer'){ grid[6][2]=3; grid[7][1]=3; grid[5][2]=3; }
  // spiegeln auf rechte Hälfte
  for(let y=0;y<G;y++)for(let x=0;x<8;x++){ if(grid[y][x]) grid[y][G-1-x]=grid[y][x]; }
  // zeichnen
  function px(x,y,col){ c.fillStyle=col; c.fillRect(x,y,1,1); }
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){
    const v=grid[y][x]; if(!v) continue;
    let col=base;
    if(v===2) col=light; else if(v===3) col='#ffcf5a';
    // Schattierung unten
    if(y>cy+2 && v===1) col=dark;
    // Highlight oben
    if(y<cy-1 && v===1) col=light;
    px(x,y,col);
    // Outline
    if(x>0&&!grid[y][x-1]) px(x-1,y,dark);
    if(x<G-1&&!grid[y][x+1]) px(x+1,y,dark);
    if(y>0&&!grid[y-1][x]) px(x,y-1,dark);
    if(y<G-1&&!grid[y+1][x]) px(x,y+1,dark);
  }
  // Augen
  px(6,8,white); px(6,8,eye); px(6,8,eye);
  c.fillStyle=eye; c.fillRect(6,8,1,1); c.fillRect(10,8,1,1);
  c.fillStyle=white; c.fillRect(6,7,1,1); c.fillRect(10,7,1,1);
  // Mund
  c.fillStyle=dark; c.fillRect(7,11,3,1);
  spriteCache[speciesKey]=cv; return cv;
}
function drawCreature(speciesKey, x, y, size, flip){
  const key='cre_'+speciesKey;
  // bevorzugt das generierte 16-bit-Sprite, sonst prozeduraler Fallback
  const s = imgReady(key) ? IMG[key] : makeCreatureSprite(speciesKey);
  CTX.save();
  CTX.imageSmoothingEnabled=false;
  if(flip){ CTX.translate(Math.round(x)+size,Math.round(y)); CTX.scale(-1,1); CTX.drawImage(s,0,0,size,size); }
  else { CTX.drawImage(s,Math.round(x),Math.round(y),size,size); }
  CTX.restore();
}

   PIXEL-ART: Charakter-Sprites (Spieler/NPC), 16x16, 4 Richtungen
   ========================================================================= */
function drawCharacter(x,y,dir,frame,palette){
  const skin=palette.skin||'#f0c090', hair=palette.hair||'#5a3a1a',
        shirt=palette.shirt||'#d24b4b', pants=palette.pants||'#33384a', shoe='#222';
  const c=CTX;
  function r(px,py,w,h,col){ c.fillStyle=col; c.fillRect(Math.floor(x)+px,Math.floor(y)+py,w,h); }
  // Beine (Lauf-Animation)
  const step = frame%2===0?0:1;
  r(4,12,3,3,pants); r(9,12,3,3,pants);
  if(dir==='down'||dir==='up'){ r(4,14+step,3,2,shoe); r(9,14-step,3,2,shoe); }
  else { r(5,14,4,2,shoe); }
  // Körper
  r(3,7,10,6,shirt);
  // Kopf
  r(4,1,8,7,skin);
  // Haare
  r(3,0,10,3,hair);
  if(dir==='down'){ r(3,1,2,4,hair); r(11,1,2,4,hair);
    c.fillStyle='#222'; c.fillRect(x+5,y+4,1,2); c.fillRect(x+10,y+4,1,2); }
  else if(dir==='up'){ r(3,1,10,6,hair); }
  else if(dir==='left'){ r(3,1,3,5,hair); c.fillStyle='#222'; c.fillRect(x+5,y+4,1,2); }
  else if(dir==='right'){ r(10,1,3,5,hair); c.fillStyle='#222'; c.fillRect(x+10,y+4,1,2); }
}

// Zeichnet eine an Weltkoordinaten verankerte Kachel aus einer nahtlosen
// Textur, sodass benachbarte Kacheln ein durchgehendes Bodenbild ergeben.
function drawGround(imgKey, sx, sy, x, y){
  const im=IMG[imgKey];
  if(!(im && im.complete && im.naturalWidth>0)) return false;
  const tw=im.naturalWidth, th=im.naturalHeight, T=TILE;
  const ox=((x*T)%tw+tw)%tw, oy=((y*T)%th+th)%th;
  CTX.imageSmoothingEnabled=false;
  const w1=Math.min(T,tw-ox), h1=Math.min(T,th-oy);
  CTX.drawImage(im, ox,oy,w1,h1, sx,sy,w1,h1);
  if(w1<T) CTX.drawImage(im, 0,oy, T-w1,h1, sx+w1,sy, T-w1,h1);
  if(h1<T) CTX.drawImage(im, ox,0, w1,T-h1, sx,sy+h1, w1,T-h1);
  if(w1<T&&h1<T) CTX.drawImage(im, 0,0, T-w1,T-h1, sx+w1,sy+h1, T-w1,T-h1);
  return true;
}
// Jahreszeiten-/Schnee-Tönung über eine texturierte Bodenkachel
function seasonTint(sx,sy,season){
  if(season===2){ CTX.fillStyle='rgba(170,120,40,0.28)'; CTX.fillRect(sx,sy,TILE,TILE); }
  else if(season===3){ CTX.fillStyle='rgba(230,238,245,0.62)'; CTX.fillRect(sx,sy,TILE,TILE); }
}
// Tile-Zeichner. season + nightAmt beeinflussen Optik.
function drawTile(ch, sx, sy, season, x, y){
  const c=CTX;
  function fill(col){ c.fillStyle=col; c.fillRect(sx,sy,TILE,TILE); }
  const winter = (season===3);
  const autumn = (season===2);
  switch(ch){
    case '.': case 'F': case ',':{
      if(drawGround('t_grass',sx,sy,x,y)){
        if(ch===','){ // Hochgras-Büschel als Overlay, leicht wiegend
          c.fillStyle = winter? '#a9c0aa' : (autumn? '#7e8a3a':'#2f6b28');
          const sw=Math.round(Math.sin(Date.now()/350 + x*0.7 + y*0.4));
          for(let i=0;i<6;i++){ const px=sx+2+(i*2)%TILE, py=sy+6+((i*3)%8); c.fillRect(px+sw,py,2,6); }
        }
        if(ch==='F'&&!winter){ c.fillStyle=autumn?'#d98b3a':'#f2d54b'; c.fillRect(sx+6,sy+6,4,4); c.fillStyle='#fff'; c.fillRect(sx+7,sy+7,2,2); }
        seasonTint(sx,sy,season);
        break;
      }
      let g1='#6db04f', g2='#5da043';
      if(season===1){ g1='#7cc057'; g2='#69ad48'; }      // Sommer
      else if(autumn){ g1='#9a9a4a'; g2='#8a8a40'; }      // Herbst
      else if(winter){ g1='#d8e2e8'; g2='#c8d4dc'; }      // Winter (Schnee)
      fill(g1);
      c.fillStyle=g2;
      for(let i=0;i<4;i++){ const px=sx+((x*7+i*5)%TILE), py=sy+((y*5+i*4)%TILE); c.fillRect(px,py,2,2); }
      if(ch===','){ // Hochgras, leicht wiegend
        c.fillStyle = winter? '#a9c0aa' : (autumn? '#7e8a3a':'#3f7d33');
        const sw=Math.round(Math.sin(Date.now()/350 + x*0.7 + y*0.4));
        for(let i=0;i<6;i++){ const px=sx+2+(i*2)%TILE, py=sy+6+((i*3)%8); c.fillRect(px+sw,py,2,6); }
      }
      if(ch==='F'&&!winter){ c.fillStyle=autumn?'#d98b3a':'#e8d24b'; c.fillRect(sx+6,sy+6,3,3); c.fillStyle='#fff'; c.fillRect(sx+7,sy+7,1,1); }
      break;
    }
    case '=':{
      if(drawGround('t_path',sx,sy,x,y)){ seasonTint(sx,sy,season); break; }
      fill(winter?'#d2c9b8':'#caa873'); c.fillStyle=winter?'#c2b9a8':'#b89863';
      c.fillRect(sx,sy,TILE,2); c.fillRect(sx,sy+TILE-2,TILE,2);
      break;
    }
    case '#':{
      if(!drawGround('t_grass',sx,sy,x,y)) fill(winter?'#d8e2e8':'#5da043');
      else seasonTint(sx,sy,season);
      // Baum auf Grasbasis
      c.fillStyle=winter?'#dfe8ee':(autumn?'#c07a2a':'#2f7a2a'); c.fillRect(sx+2,sy,12,11);
      c.fillStyle=winter?'#eef4f8':(autumn?'#d89446':'#3a8a34'); c.fillRect(sx+4,sy+2,8,6);
      c.fillStyle='#6b4a2a'; c.fillRect(sx+6,sy+11,4,5);
      break;
    }
    case 'R': case '*':{
      fill('#7a6f5e'); c.fillStyle='#6a5f4e'; c.fillRect(sx+2,sy+2,12,12);
      c.fillStyle='#8a7f6e'; c.fillRect(sx+3,sy+3,5,5);
      c.fillStyle='#5a4f3e'; c.fillRect(sx+9,sy+9,4,4);
      break;
    }
    case 'W':{
      if(drawGround('t_water',sx,sy,x,y)){
        const t=Date.now()/600; // dezenter Glanz als Overlay
        c.fillStyle='rgba(180,220,255,0.5)'; c.fillRect(sx+2+((Math.sin(t+x)*2)|0),sy+2,3,1);
        break;
      }
      const t=Date.now()/600;
      fill('#3a7fc4'); c.fillStyle='#4a90d9';
      for(let i=0;i<3;i++){ const py=sy+3+i*5+Math.sin(t+x+i)*1; c.fillRect(sx+2,py,12,2); }
      c.fillStyle='#7ab0e8'; c.fillRect(sx+2+((Math.sin(t+x)*2)|0),sy+2,3,1);
      break;
    }
    case 'H':{ fill('#b56a4a'); c.fillStyle='#a25a3a'; c.fillRect(sx,sy,TILE,2); for(let i=0;i<TILE;i+=4)c.fillRect(sx+i,sy,1,TILE); break; }
    case 'B':{ fill('#6a6f7a'); c.fillStyle='#5a5f6a'; for(let i=0;i<TILE;i+=4)c.fillRect(sx,sy+i,TILE,1); break; }
    case 'D':{ fill('#6a4a2a'); c.fillStyle='#4a3a1a'; c.fillRect(sx+3,sy+1,10,15); c.fillStyle='#e8d24b'; c.fillRect(sx+10,sy+8,2,2); break; }
    case 'S':{ fill(winter?'#d8e2e8':'#6db04f'); c.fillStyle='#8a6a3a'; c.fillRect(sx+3,sy+8,10,5); c.fillStyle='#6a4a2a'; c.fillRect(sx+7,sy+11,2,4); break; }
    case 'L':{ fill('#caa873'); c.fillStyle='#8a6a3a'; c.fillRect(sx,sy+TILE-4,TILE,4); c.fillStyle='#6a4a2a'; c.fillRect(sx,sy+TILE-2,TILE,2); break; }
    case ' ':{ fill('#d8cfc0'); c.fillStyle='#cec5b6'; if((x+y)%2===0)c.fillRect(sx,sy,TILE,TILE); c.fillStyle='#c8bfb0'; c.fillRect(sx,sy,TILE,1); break; }
    case '~':{ fill('#c25a5a'); c.fillStyle='#b24a4a'; c.fillRect(sx+1,sy+1,TILE-2,TILE-2); c.fillStyle='#d26a6a'; c.fillRect(sx+3,sy+3,2,2); break; }
    case 'C':{ fill('#8a6a3a'); c.fillStyle='#6a4a2a'; c.fillRect(sx,sy,TILE,3); c.fillStyle='#a07a4a'; c.fillRect(sx+1,sy+4,TILE-2,TILE-5); break; }
    case 'M':{ fill('#d8cfc0'); c.fillStyle='#7a5a8a'; c.fillRect(sx+2,sy+2,12,12); c.fillStyle='#9a7aaa'; c.fillRect(sx+3,sy+3,10,4); break; }
    case '+': case 'O':{ if(drawGround('t_cave',sx,sy,x,y)) break; fill('#4a4640'); c.fillStyle='#423e38'; for(let i=0;i<3;i++){ c.fillRect(sx+((x*5+i*4)%TILE),sy+((y*4+i*3)%TILE),2,2);} break; }
    case 'P':{ if(!drawGround('t_cave',sx,sy,x,y)) fill('#4a4640'); c.fillStyle='#3a5a3a'; const sw=Math.round(Math.sin(Date.now()/350 + x*0.7 + y*0.4)); for(let i=0;i<5;i++){ c.fillRect(sx+2+(i*2)%TILE+sw, sy+6+((i*3)%8),2,6);} break; }
    default: fill('#000');
  }
}

/* =========================================================================
   SPIELZUSTAND
   ========================================================================= */
let G = null; // globaler Spielstand
function newGame(){
  return {
    map:'spielerhaus', px:4, py:4, dir:'down',
    party:[], box:[],
    bag:{ trank:5, fangkugel:5, gegengift:1 },
    money:1500,
    badges:[], dex:{}, // dex[speciesKey] = 'seen' | 'caught'

    gameMinutes: 8*60, // Start: 8:00 Uhr
    dayCount:0, season:0, // 0 Frühling,1 Sommer,2 Herbst,3 Winter

  };
}

/* SAVE / LOAD via localStorage */
const SAVE_KEY = 'velora_saga_save_v1';
function saveGame(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(G)); return true; }catch(e){ return false; }
}
function loadGame(){
  try{ const s=localStorage.getItem(SAVE_KEY); if(!s) return null; return JSON.parse(s); }catch(e){ return null; }
}
function hasSave(){ try{ return !!localStorage.getItem(SAVE_KEY); }catch(e){ return false; } }

/* =========================================================================
   SPIELZUSTÄNDE (State Machine)
   ========================================================================= */
const STATE = { TITLE:'title', STARTER:'starter', OVERWORLD:'overworld', DIALOG:'dialog',
                MENU:'menu', BATTLE:'battle', SHOP:'shop', PARTY:'party', BAG:'bag',
                DEX:'dex', MAP:'map', EVOLVE:'evolve' };
let state = STATE.TITLE;
let prevState = STATE.OVERWORLD;

/* =========================================================================
   OVERWORLD-LOGIK
   ========================================================================= */
const ow = {
  moving:false, fromX:0, fromY:0, toX:0, toY:0, progress:0, speed:6,
  animFrame:0, animTimer:0, stepCount:0, camX:0, camY:0
};
function curMap(){ return MAPS[G.map]; }
function tileAt(map, x, y){
  if(y<0||y>=map.grid.length) return 'B';
  const row=map.grid[y]; if(x<0||x>=row.length) return 'B';
  return row[x];
}
function isSolid(map,x,y){
  const ch=tileAt(map,x,y); const d=TILE_DEF[ch];
  return d? d.solid : true;
}
function npcAt(map,x,y){ return (map.npcs||[]).find(n=>n.x===x&&n.y===y); }

function tryMove(dx,dy,dir){
  G.dir=dir;
  const map=curMap();
  const nx=G.px+dx, ny=G.py+dy;
  // Kante (ledge) — nur nach unten springen
  const targetCh = tileAt(map,nx,ny);
  if(isSolid(map,nx,ny) || npcAt(map,nx,ny)){
    Audio2.sfx('bump'); return;
  }
  ow.moving=true; ow.fromX=G.px; ow.fromY=G.py; ow.toX=nx; ow.toY=ny; ow.progress=0;
}
function finishMove(){
  const map=curMap();
  G.px=ow.toX; G.py=ow.toY; ow.moving=false; ow.stepCount++;
  // Warp?
  const w=(map.warps||[]).find(w=>w.x===G.px&&w.y===G.py);
  if(w){ doWarp(w); return; }
  // Encounter?
  const ch=tileAt(map,G.px,G.py);
  const d=TILE_DEF[ch];
  if(d&&d.encounter && map.encounters && Object.keys(map.encounters).length){
    if(Math.random()<0.12){ startWildBattle(); return; }
  }
}
function doWarp(w){
  if(w.dynamicReturn){
    // Rückkehr aus Heilstation/Shop
    const r=G._return;
    if(r){ G.map=r.map; G.px=r.x; G.py=r.y; G.dir='down'; }
    Audio2.play(curMap().music); return;
  }
  if(w.ret){ G._return={map:w.ret, x:w.rx, y:w.ry}; }
  G.map=w.to; G.px=w.tx; G.py=w.ty;
  const m=curMap();
  Audio2.play(m.music||'overworld');
}

function interact(){
  const map=curMap();
  const dirs={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  const [dx,dy]=dirs[G.dir];
  const fx=G.px+dx, fy=G.py+dy;
  // NPC?
  const npc=npcAt(map,fx,fy);
  if(npc){ handleNpc(npc); return; }
  // Schild?
  const sign=(map.signs||{})[fx+','+fy];
  if(sign){ openDialog(sign.split('\n'), null); return; }
}

/* =========================================================================
   DIALOG-SYSTEM
   ========================================================================= */
const dlg = { lines:[], idx:0, onDone:null, charIdx:0, charTimer:0, full:'', speaker:null };
function openDialog(lines, onDone, speaker){
  dlg.lines = Array.isArray(lines)?lines:[lines];
  dlg.idx=0; dlg.charIdx=0; dlg.charTimer=0; dlg.onDone=onDone||null; dlg.speaker=speaker||null;
  dlg.full = dlg.lines[0]||'';
  prevState = state===STATE.DIALOG?prevState:state;
  state=STATE.DIALOG;
}
function advanceDialog(){
  if(dlg.charIdx < dlg.full.length){ dlg.charIdx=dlg.full.length; return; } // erst Text vervollständigen
  dlg.idx++;
  if(dlg.idx>=dlg.lines.length){
    const cb=dlg.onDone; dlg.onDone=null;
    state=prevState;
    if(cb) cb();
  } else {
    dlg.full=dlg.lines[dlg.idx]; dlg.charIdx=0; dlg.charTimer=0;
  }
}

const battle = {
  active:false, wild:false, trainer:null, music:'battle',
  player:null, enemy:null, enemyTeam:[], enemyIdx:0,
  menu:'main', // main | fight | bag | party
  cursor:0, sub:0,
  log:[], logIdx:0, logTimer:0, logChar:0,

  queue:[], anim:0, result:null, animTime:0, animCb:null,
  playerHpShown:0, enemyHpShown:0,
  caughtKey:null, runAttempts:0, escaped:false, expGain:0,
  switching:false, mustSwitch:false, reward:0
};
function activePlayer(){ return G.party.find(c=>c.hp>0); }

/* =========================================================================
   KAMPF-ANIMATIONEN (Pokémon-Schwarz-Stil): Einflug, Idle-Atmen, Angriffs-
   Vorstoß, Treffer-Blinken, Bildschirm-Shake, Typ-Partikel, KO-Absinken.
   Rein visuell — die Kampf-Logik (Callback-Kette) bleibt unberührt.
   ========================================================================= */
const LUNGE_T=0.34, HIT_T=0.42;
const BFX = {
  shake:0, flash:0, intro:0, ambT:0,
  entry:{player:0, enemy:0},   // 1 = außerhalb, 0 = auf Position
  hit:{player:0, enemy:0},     // Restzeit Treffer-Rückstoß/Blinken (s)
  lunge:{player:0, enemy:0},   // Restzeit Angriffs-Vorstoß (s)
  faint:{player:0, enemy:0},   // 0..1 Absink-Fortschritt
  parts:[]                     // Partikel {x,y,vx,vy,life,max,color,r,g}
};
function easeOutCubic(p){ return 1-Math.pow(1-p,3); }
function bfxReset(side){ BFX.hit[side]=0; BFX.lunge[side]=0; BFX.faint[side]=0; }
function bfxEntry(side){ BFX.entry[side]=1; bfxReset(side); }
function bfxFaint(side){ if(BFX.faint[side]<=0) BFX.faint[side]=0.0001; }
function bfxStart(){ BFX.flash=1; BFX.shake=0; BFX.intro=0.7; BFX.ambT=0; BFX.parts.length=0; bfxEntry('player'); bfxEntry('enemy'); }
function bfxSpawn(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=40+Math.random()*90;
    BFX.parts.push({x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-40, life:0, max:0.4+Math.random()*0.35, color, r:2+rnd(3), g:160});
  }
}
function bfxAttack(who, eff, type){
  const def = who==='player'?'enemy':'player';
  BFX.lunge[who]=LUNGE_T; BFX.hit[def]=HIT_T;
  BFX.shake=Math.min(11, 4+eff*3);
  const pos = def==='enemy'? {x:362,y:92} : {x:110,y:222};
  bfxSpawn(pos.x, pos.y, TYPE_COLORS[type]||'#fff', 16);
}
// Dezente typ-spezifische Ambient-Partikel an einem Wesen (Glut, Funken, Blasen …)
function spawnAmbient(side, c, x, y){
  if(!c || BFX.faint[side]>0 || BFX.entry[side]>0.1) return;
  const ty=SPECIES[c.species]?SPECIES[c.species].type:'Normal';
  let col, vy=-26, life=0.85, r=2, g=22;
  if(ty==='Feuer'){ col='#ffb13a'; vy=-50; life=0.7; g=10; }
  else if(ty==='Elektro'){ if(Math.random()<0.55) return; col='#fff27a'; vy=-6; life=0.32; r=2; g=0; }
  else if(ty==='Wasser'){ if(Math.random()<0.3) return; col='#bfe6ff'; vy=-20; g=8; }
  else if(ty==='Flug'){ if(Math.random()<0.62) return; col='#e6f2ff'; vy=-14; g=6; }
  else if(ty==='Pflanze'){ if(Math.random()<0.5) return; col='#9bd86a'; vy=-12; g=14; }
  else return; // Normal/Gestein: keine Ambient-Partikel
  BFX.parts.push({x:x+(Math.random()*26-13), y:y+(Math.random()*14-2), vx:(Math.random()*2-1)*9, vy:vy*(0.6+Math.random()*0.7), life:0, max:life, color:col, r, g});
}
function updateBFX(dt){
  if(BFX.shake>0) BFX.shake=Math.max(0, BFX.shake-dt*42);
  if(BFX.flash>0) BFX.flash=Math.max(0, BFX.flash-dt*2.3);
  if(BFX.intro>0) BFX.intro=Math.max(0, BFX.intro-dt);
  for(const s of ['player','enemy']){
    if(BFX.entry[s]>0) BFX.entry[s]=Math.max(0, BFX.entry[s]-dt*2.4);
    if(BFX.hit[s]>0)   BFX.hit[s]=Math.max(0, BFX.hit[s]-dt);
    if(BFX.lunge[s]>0) BFX.lunge[s]=Math.max(0, BFX.lunge[s]-dt);
    if(BFX.faint[s]>0 && BFX.faint[s]<1) BFX.faint[s]=Math.min(1, BFX.faint[s]+dt*2.1);
  }
  BFX.ambT-=dt;
  if(BFX.ambT<=0 && battle.active && state===STATE.BATTLE){
    BFX.ambT=0.20;
    spawnAmbient('enemy', battle.enemy, 362, 96);
    spawnAmbient('player', battle.player, 110, 226);
  }
  for(let i=BFX.parts.length-1;i>=0;i--){
    const p=BFX.parts[i]; p.life+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=(p.g==null?160:p.g)*dt;
    if(p.life>=p.max) BFX.parts.splice(i,1);
  }
}
// Typ-spezifische Idle-Bewegung (Atmen, Schweben, Flackern, Wackeln …)
function typeMotion(type, t){
  let bob=Math.sin(t*2.0)*2.0, amp=0.05, spd=2.0, rot=0, jx=0;
  switch(type){
    case 'Flug':    bob=Math.sin(t*2.7)*5.2; rot=Math.sin(t*2.7)*0.06; amp=0.085; spd=2.7; break;
    case 'Feuer':   bob=Math.sin(t*3.1)*1.5; spd=6.2; amp=0.05+Math.abs(Math.sin(t*9.5))*0.035; jx=Math.sin(t*22)*0.7; break;
    case 'Wasser':  bob=Math.sin(t*1.8)*2.2; jx=Math.sin(t*1.5)*1.6; amp=0.08; spd=1.8; break;
    case 'Elektro': bob=Math.sin(t*2.4)*2.0; { const ph=t%1.5; if(ph<0.1) jx=(Math.random()*2-1)*1.6; } break;
    case 'Gestein': bob=Math.sin(t*1.1)*0.9; amp=0.022; spd=1.1; break;
    case 'Pflanze': bob=Math.sin(t*1.8)*2.0; rot=Math.sin(t*1.5)*0.025; amp=0.055; break;
  }
  const breathe=Math.sin(t*spd);
  return { bob, jx, sx:1 - amp*0.6*breathe, sy:1 + amp*breathe, rot };
}
// Zeichnet ein Kampf-Wesen mit voller prozeduraler Animation (am Boden verankert).
function drawBattler(side, species, bx, by, size, flip){
  const t=performance.now()/1000 + (side==='enemy'?0.7:0);
  const type=(SPECIES[species]&&SPECIES[species].type)||'Normal';
  const m=typeMotion(type, t);
  let x=bx + m.jx, y=by + m.bob, sx=m.sx, sy=m.sy, rot=m.rot, alpha=1;
  const dirAway = (side==='enemy'? 1:-1), dirToFoe = -dirAway;
  // Einflug (eased)
  if(BFX.entry[side]>0){ const pin=1-BFX.entry[side]; x += dirAway*(1-easeOutCubic(pin))*300; alpha*=easeOutCubic(Math.min(1,pin*1.6)); }
  // Angriff: Ausholen -> Vorstoß -> zurück
  if(BFX.lunge[side]>0){
    const p=1-BFX.lunge[side]/LUNGE_T; let k;
    if(p<0.22) k=-(p/0.22)*0.34; else k=Math.sin(((p-0.22)/0.78)*Math.PI);
    x += dirToFoe*k*30; y += (side==='enemy'?1:-1)*Math.max(0,k)*10;
    sx*=1+0.06*Math.max(0,k); sy*=1-0.05*Math.max(0,k);
  }
  // Treffer: Rückstoß + Stauchen + Blinken
  if(BFX.hit[side]>0){
    const h=BFX.hit[side]/HIT_T;
    x += dirAway*h*9*Math.sin(performance.now()/26);
    sx*=1+0.06*h; sy*=1-0.06*h;
    if(Math.floor(t*30)%2===0) alpha*=0.32;
  }
  // KO: absinken, stauchen, ausblenden
  if(BFX.faint[side]>0){ const f=BFX.faint[side]; y+=f*46; sy*=Math.max(0.18,1-f*0.85); alpha*=Math.max(0,1-f); }
  const ax=x+size/2, ay=by+size; // Verankerung an den Füßen
  CTX.save();
  CTX.globalAlpha=clamp(alpha,0,1);
  CTX.translate(ax,ay); CTX.rotate(rot); CTX.scale(sx,sy); CTX.translate(-ax,-ay);
  drawCreature(species, x, y, size, flip);
  CTX.restore();
  CTX.globalAlpha=1;
}
function drawBattleParts(){
  for(const p of BFX.parts){
    CTX.globalAlpha=Math.max(0, 1-p.life/p.max);
    CTX.fillStyle=p.color; CTX.fillRect(Math.round(p.x), Math.round(p.y), p.r, p.r);
  }
  CTX.globalAlpha=1;
}

function startWildBattle(){
  const map=curMap();
  const table = map.encounters[G.season] || map.encounters[0];
  if(!table) return;
  const total = table.reduce((a,b)=>a+b.w,0);
  let r=rnd(total), pick=table[0];
  for(const e of table){ if(r<e.w){ pick=e; break; } r-=e.w; }
  const lvl = pick.min + rnd(pick.max-pick.min+1);
  const enemy=makeCreature(pick.s, lvl);
  beginBattle({wild:true, enemy});
}
function startTrainerBattle(npc){
  const t=npc.trainer;
  const team=t.team.map(([s,l])=>makeCreature(s,l));
  beginBattle({wild:false, trainer:t, team, npc});
}
function beginBattle(opts){
  battle.active=true; battle.wild=opts.wild;
  battle.trainer=opts.trainer||null; battle.npc=opts.npc||null;
  battle.music = (opts.trainer&&opts.trainer.music)||'battle';
  battle.enemyTeam = opts.wild? [opts.enemy] : opts.team;
  battle.enemyIdx=0; battle.enemy=battle.enemyTeam[0];
  battle.player = activePlayer();
  battle.menu='main'; battle.cursor=0; battle.sub=0;
  battle.phase='intro'; battle.queue=[]; battle.runAttempts=0; battle.escaped=false;
  battle.reward = opts.trainer? opts.trainer.reward : 0;
  battle.mustSwitch=false; battle.result=null;
  battle.playerHpShown=battle.player.hp; battle.enemyHpShown=battle.enemy.hp;
  // Dex: gesehen
  if(!G.dex[battle.enemy.species]) G.dex[battle.enemy.species]='seen';
  Audio2.play(battle.music);
  state=STATE.BATTLE;
  bfxStart();
  // Intro-Text
  const introLines = battle.wild
    ? ['Ein wildes '+battle.enemy.name+' erscheint!']
    : [battle.trainer.name+' will kämpfen!'];
  battleMsg(introLines, ()=>{ battle.phase='menu'; });
}

let battleMsgQueue=[], battleMsgCb=null, battleMsgChar=0, battleMsgFull='', battleMsgTimer=0;
function battleMsg(lines, cb){
  battleMsgQueue = Array.isArray(lines)?lines.slice():[lines];
  battleMsgCb=cb||null; battleMsgChar=0; battleMsgTimer=0;
  battleMsgFull=battleMsgQueue[0]||''; battle.phase='message';
}
function battleMsgAdvance(){
  if(battleMsgChar<battleMsgFull.length){ battleMsgChar=battleMsgFull.length; return; }
  battleMsgQueue.shift();
  if(battleMsgQueue.length===0){ const cb=battleMsgCb; battleMsgCb=null; if(cb)cb(); }
  else { battleMsgFull=battleMsgQueue[0]; battleMsgChar=0; battleMsgTimer=0; }
}
// Getaktete, nicht-interaktive Animationsphase: spielt dur Sekunden lang die
// Kampf-Animation, ohne auf Eingabe zu warten, und ruft danach cb auf.
// Während dieser Phase bleibt die zuletzt gezeigte Nachricht stehen.
function battleAnim(dur, cb){ battle.phase='anim'; battle.animTime=dur; battle.animCb=cb||null; }

function calcDamage(att, def, move){
  const m=MOVES[move.key];
  if(m.power===0) return {dmg:0, eff:1};
  const stab = SPECIES[att.species].type===m.type ? 1.5 : 1;
  const eff = typeEff(m.type, SPECIES[def.species].type);
  const lvl=att.level;
  let dmg = Math.floor( ( (2*lvl/5+2) * m.power * att.stats.atk / def.stats.def ) / 50 ) + 2;
  dmg = Math.floor(dmg * stab * eff * rndRange(0.85,1.0));
  return {dmg:Math.max(1,dmg), eff};
}
function moveHits(move){
  const m=MOVES[move.key];
  return Math.random()*100 < m.acc;
}
function speedOf(c){
  let s=c.stats.spd;
  if(c.status==='paralyse') s=Math.floor(s/2);
  return s;
}

// Spieleraktion gewählt -> Runde ausführen
function execTurn(playerAction){
  const p=battle.player, e=battle.enemy;
  const actions=[];
  // Gegner-KI: zufällige Attacke
  const enemyMove = chooseEnemyMove(e);
  // Reihenfolge bestimmen
  let pFirst=true;
  if(playerAction.type==='move' && enemyMove){
    pFirst = speedOf(p) >= speedOf(e);
    if(speedOf(p)===speedOf(e)) pFirst = Math.random()<0.5;
  }
  // Aktionen ohne Move (Item/Switch/Run) gehen meist zuerst, dann Gegner-Move
  const seq=[];
  if(playerAction.type!=='move'){
    seq.push({who:'player', action:playerAction});
    if(enemyMove) seq.push({who:'enemy', action:{type:'move', move:enemyMove}});
  } else {
    if(pFirst){ seq.push({who:'player', action:playerAction}); if(enemyMove) seq.push({who:'enemy', action:{type:'move', move:enemyMove}}); }
    else { if(enemyMove) seq.push({who:'enemy', action:{type:'move', move:enemyMove}}); seq.push({who:'player', action:playerAction}); }
  }
  runSequence(seq, 0);
}
function chooseEnemyMove(e){
  const usable=e.moves.filter(m=>m.pp>0);
  if(usable.length===0) return null;
  return choice(usable);
}

function runSequence(seq, i){
  if(i>=seq.length){ endOfTurn(); return; }
  const step=seq[i];
  const next=()=>runSequence(seq, i+1);
  const actor = step.who==='player'?battle.player:battle.enemy;
  // tot?
  if(actor.hp<=0){ next(); return; }
  const act=step.action;
  if(act.type==='run'){ doRun(next); return; }
  if(act.type==='item'){ doItem(act, next); return; }
  if(act.type==='switch'){ doSwitch(act, next); return; }
  if(act.type==='catch'){ doCatch(next); return; }
  if(act.type==='move'){ doMove(step.who, act.move, next); return; }
  next();
}

function doMove(who, move, next){
  const attacker = who==='player'?battle.player:battle.enemy;
  const defender = who==='player'?battle.enemy:battle.player;
  // Status-Hindernisse
  if(attacker.status==='schlaf'){
    if(attacker.sleepTurns>0){
      attacker.sleepTurns--;
      battleMsg([attacker.name+' schläft tief und fest.'], next); return;
    } else { attacker.status=null; battleMsg([attacker.name+' wacht auf!'], ()=>doMoveReal(who,move,defender,attacker,next)); return; }
  }
  if(attacker.status==='paralyse' && Math.random()<0.25){
    battleMsg([attacker.name+' ist paralysiert und kann sich nicht rühren!'], next); return;
  }
  doMoveReal(who,move,defender,attacker,next);
}
function doMoveReal(who,move,defender,attacker,next){
  const m=MOVES[move.key];
  move.pp=Math.max(0,move.pp-1);
  // 1) Ansage der Attacke (Text stehen lassen)
  battleMsg([attacker.name+' setzt '+m.name+' ein!'], ()=>{
    if(!moveHits(move)){ battleMsg(['Die Attacke geht daneben!'], next); return; }
    // Schaden vorberechnen, aber NOCH NICHT anwenden
    let dmg=0, eff=1;
    if(m.power>0){ const r=calcDamage(attacker, defender, move); dmg=r.dmg; eff=r.eff; }
    // 2) Angriffs-Animation: erst Bewegung/Effekt …
    bfxAttack(who, eff, m.type);
    if(m.power>0) Audio2.sfx(eff>1?'superhit':'hit');
    battleAnim(0.55, ()=>{
      const lines=[];
      // 3) … dann Schaden anwenden -> KP-Balken läuft jetzt sichtbar runter
      if(m.power>0){
        defender.hp=Math.max(0, defender.hp-dmg);
        if(eff>1) lines.push('Das ist sehr effektiv!');
        else if(eff<1 && eff>0) lines.push('Das ist nicht sehr effektiv...');
        else if(eff===0) lines.push('Es zeigt keine Wirkung...');
      }
      // Status-Effekt der Attacke
      if(m.status && (!defender.status) && defender.hp>0 && Math.random()*100 < (m.statusChance||0)){
        defender.status=m.status;
        if(m.status==='schlaf') defender.sleepTurns=1+rnd(3);
        const sl={gift:'wurde vergiftet!', paralyse:'ist nun paralysiert!', schlaf:'ist eingeschlafen!'};
        lines.push(defender.name+' '+sl[m.status]);
      }
      const proceed=()=>{ if(defender.hp<=0){ handleFaint(defender, next); } else next(); };
      // Effekt-/Status-Text zeigen; sonst dem Balken kurz Zeit zum Auslaufen geben
      if(lines.length) battleMsg(lines, proceed);
      else battleAnim(0.45, proceed);
    });
  });
}

function handleFaint(c, next){
  Audio2.sfx('faint');
  const isEnemy = (c===battle.enemy);
  bfxFaint(isEnemy?'enemy':'player');
  battleMsg([c.name+(isEnemy?' wurde besiegt!':' deines Teams wurde besiegt!')], ()=>{
    if(isEnemy){
      // EXP vergeben
      const exp = Math.floor(SPECIES[c.species].baseExp * c.level / 6);
      grantExp(exp, ()=>{
        // nächster Gegner?
        if(battle.enemyIdx < battle.enemyTeam.length-1){
          battle.enemyIdx++; battle.enemy=battle.enemyTeam[battle.enemyIdx];
          battle.enemyHpShown=battle.enemy.hp;
          if(!G.dex[battle.enemy.species]) G.dex[battle.enemy.species]='seen';
          bfxEntry('enemy');
          battleMsg([battle.trainer.name+' schickt '+battle.enemy.name+' in den Kampf!'], ()=>{ battle.phase='menu'; });
        } else {
          winBattle();
        }
      });
    } else {
      // Spieler-Wesen besiegt -> Wechsel erzwingen oder verloren
      if(G.party.some(x=>x.hp>0)){
        battle.mustSwitch=true; battle.phase='party'; partyScr.idx=0; partyScr.context='battle';
      } else {
        loseBattle();
      }
    }
  });
}

let pendingExp=0;
function grantExp(amount, done){
  const c=battle.player;
  if(c.hp<=0){ // tote bekommen kein exp; gib aktivem
    const alt=activePlayer(); if(!alt){ done(); return; }
  }
  const gainer = c.hp>0?c:activePlayer();
  if(!gainer){ done(); return; }
  gainer.exp += amount;
  battleMsg([gainer.name+' erhält '+amount+' E-Punkte!'], ()=>checkLevel(gainer, done));
}
function checkLevel(c, done){
  if(c.level>=100){ done(); return; }
  if(c.exp >= expForLevel(c.level+1)){
    c.level++;
    const oldMax=c.maxhp; computeStats(c); c.hp += (c.maxhp-oldMax);
    Audio2.sfx('levelup');
    // Neue Attacke?
    const sp=SPECIES[c.species];
    const learnable=sp.learn.filter(m=>m[0]===c.level).map(m=>m[1]);
    const lines=[c.name+' erreicht Level '+c.level+'!'];
    for(const mk of learnable){
      if(!c.moves.some(m=>m.key===mk)){
        if(c.moves.length<4){ c.moves.push({key:mk,pp:MOVES[mk].pp,maxpp:MOVES[mk].pp}); lines.push(c.name+' erlernt '+MOVES[mk].name+'!'); }
        else { c.moves.shift(); c.moves.push({key:mk,pp:MOVES[mk].pp,maxpp:MOVES[mk].pp}); lines.push(c.name+' erlernt '+MOVES[mk].name+'!'); }
      }
    }
    battleMsg(lines, ()=>{
      // Entwicklung?
      if(sp.evo && c.level>=sp.evo.level){ startEvolution(c, ()=>checkLevel(c,done)); }
      else checkLevel(c, done); // mehrere Level auf einmal möglich
    });
  } else done();
}

let evo={c:null, t:0, from:null, to:null, cb:null};
function startEvolution(c, cb){
  evo.c=c; evo.from=c.species; evo.to=SPECIES[c.species].evo.into; evo.t=0; evo.cb=cb;
  prevState=STATE.BATTLE;
  state=STATE.EVOLVE;
  Audio2.sfx('evolve');
}
function finishEvolution(){
  const c=evo.c; const toKey=evo.to;
  c.species=toKey; c.name=SPECIES[toKey].name;
  const oldMax=c.maxhp; computeStats(c); c.hp+=(c.maxhp-oldMax);
  G.dex[toKey]='caught';
  state=STATE.BATTLE;
  battleMsg([evo.from!==toKey? SPECIES[evo.from].name+' entwickelt sich zu '+c.name+'!':c.name+'!'], ()=>{ const cb=evo.cb; evo.cb=null; if(cb)cb(); });
}

function doRun(next){
  if(!battle.wild){ battleMsg(['Vor einem Duell kann man nicht fliehen!'], ()=>{ next(); }); return; }
  battle.runAttempts++;
  const pSpd=speedOf(battle.player), eSpd=speedOf(battle.enemy);
  const chance = pSpd>=eSpd ? 1 : (pSpd*128/eSpd + 30*battle.runAttempts)/256;
  if(Math.random()<chance){ battle.escaped=true; battleMsg(['Flucht gelungen!'], ()=>endBattle()); }
  else battleMsg(['Flucht gescheitert!'], next);
}
function doItem(act, next){
  const c=act.target;
  const it=ITEMS[act.item];
  G.bag[act.item]--; if(G.bag[act.item]<=0) delete G.bag[act.item];
  let line='';
  if(it.kind==='heal'){ const before=c.hp; c.hp=Math.min(c.maxhp, c.hp+it.amount); line=c.name+' wird um '+(c.hp-before)+' KP geheilt!'; Audio2.sfx('heal'); }
  else if(it.kind==='revive'){ c.hp=Math.floor(c.maxhp*it.amount); c.status=null; line=c.name+' wurde wiederbelebt!'; Audio2.sfx('heal'); }
  else if(it.kind==='cure'){ if(c.status===it.cure){ c.status=null; c.sleepTurns=0; line=c.name+' wurde geheilt!'; } else line='Es zeigt keine Wirkung.'; }
  battleMsg([act.itemName+' eingesetzt!', line], next);
}
function doSwitch(act, next){
  const idx=act.idx;
  battle.player=G.party[idx];
  battle.playerHpShown=battle.player.hp;
  bfxEntry('player');
  battleMsg(['Los, '+battle.player.name+'!'], next);
}
function doCatch(next){
  if(!battle.wild){ battleMsg(['Auf fremde Wesen kann man keine Fangkugel werfen!'], next); return; }
  const ballKey = battle._ballKey;
  const it=ITEMS[ballKey];
  G.bag[ballKey]--; if(G.bag[ballKey]<=0) delete G.bag[ballKey];
  const e=battle.enemy;
  const sp=SPECIES[e.species];
  const statusBonus = e.status? (e.status==='schlaf'?2:1.5):1;
  const a = ((3*e.maxhp - 2*e.hp) * sp.catchRate * it.ballBonus * statusBonus) / (3*e.maxhp);
  // Wackel-Checks
  const shakeProb = Math.min(255, Math.floor(1048560 / Math.floor(Math.sqrt(Math.sqrt(16711680/Math.max(1,a))))));
  let shakes=0;
  for(let i=0;i<4;i++){ if(rnd(65536) < shakeProb) shakes++; else break; }
  const caught = (a>=255) || shakes===4;
  Audio2.sfx('catch');
  battle._catchShakes=shakes;
  if(caught){
    Audio2.sfx('caught');
    battleMsg(['Wackel... wackel... klick!', e.name+' wurde gefangen!'], ()=>{
      G.dex[e.species]='caught';
      if(G.party.length<6){ G.party.push(e); battleMsg([e.name+' kommt ins Team!'], ()=>endBattle()); }
      else { G.box.push(e); battleMsg([e.name+' wird in die Aufbewahrung geschickt!'], ()=>endBattle()); }
    });
  } else {
    const msg = shakes===0?'Oh nein! Das Wesen ist sofort raus!':
                shakes===1?'Mist! Es hat sich befreit!':
                shakes===2?'Ah! Fast gefangen!':'So nah! Es ist doch entkommen!';
    battleMsg([msg], next);
  }
}

function endOfTurn(){
  // Status-Schaden (Gift)
  const tickers=[battle.player, battle.enemy];
  const doTick=(idx)=>{
    if(idx>=tickers.length){ afterTicks(); return; }
    const c=tickers[idx];
    if(c.hp>0 && c.status==='gift'){
      const dmg=Math.max(1, Math.floor(c.maxhp/8));
      c.hp=Math.max(0,c.hp-dmg);
      battleMsg([c.name+' erleidet Schaden durch Gift!'], ()=>{
        if(c.hp<=0){ handleFaint(c, ()=>doTick(idx+1)); } else doTick(idx+1);
      });
    } else doTick(idx+1);
  };
  doTick(0);
}
function afterTicks(){
  if(battle.player.hp<=0){
    if(G.party.some(x=>x.hp>0)){ battle.mustSwitch=true; battle.phase='party'; partyScr.idx=0; partyScr.context='battle'; }
    else loseBattle();
    return;
  }
  if(battle.enemy.hp<=0){ return; } // wird in handleFaint behandelt
  battle.phase='menu'; battle.menu='main'; battle.cursor=0;
}

function winBattle(){
  if(battle.trainer){
    const t=battle.trainer;
    G.money += battle.reward;
    const lines=(t.win||['Du hast gewonnen!']).slice();
    lines.unshift(t.name+' wurde besiegt!');
    lines.push('Du erhältst '+battle.reward+' Velar!');
    if(t.leader && t.badge){ G.badges.push(t.badge); lines.push('Du erhältst das '+t.badge+'!'); }
    // Flag setzen, dass Trainer besiegt
    if(battle.npc){ G.flags['beat_'+G.map+'_'+battle.npc.x+'_'+battle.npc.y]=true; }
    // Boss besiegt -> Sieg-Flag
    if(t.boss){ G.flags.gameWon=true; }
    battleMsg(lines, ()=>{
      if(t.boss){ endBattle(); showEnding(); }
      else endBattle();
    });
  } else endBattle();
}
function loseBattle(){
  battleMsg(['Alle deine Wesen wurden besiegt...','Du eilst zurück zur letzten Heilstation.'], ()=>{
    const lh=G.lastHeal;
    G.map=lh.map; G.px=lh.x; G.py=lh.y;
    healParty();
    G.money=Math.floor(G.money*0.9);
    endBattle();
  });
}
function endBattle(){
  battle.active=false;
  state=STATE.OVERWORLD;
  Audio2.play(curMap().music||'overworld');
  saveGame();
}
function showEnding(){
  state=STATE.OVERWORLD;
  Audio2.play('victory');
  openDialog([

    'Der Orden Nyx ist besiegt und Velora ist frei!',

    'bist du zur Heldin/zum Helden von Velora geworden.',
    'Deine Reise als Wesen-Forscher hat gerade erst begonnen...',
    '— ENDE — Danke fürs Spielen!'
  ], ()=>{ saveGame(); });
}

/* Tag/Nacht-Tönung */
function nightAmount(){
  const h = (G.gameMinutes/60)%24;
  // Nacht 20-5, Übergänge
  if(h>=20 || h<5) return 0.55;
  if(h>=18 && h<20) return (h-18)/2*0.55;
  if(h>=5 && h<7) return (7-h)/2*0.55;
  return 0;
}
function timeStr(){
  const h=Math.floor((G.gameMinutes/60)%24), m=Math.floor(G.gameMinutes%60);
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}

/* =========================================================================
   ZEICHNEN: OVERWORLD
   ========================================================================= */
function drawOverworld(){
  const map=curMap();
  // Kamera zentrieren
  let pxPix = (ow.moving? ow.fromX + (ow.toX-ow.fromX)*ow.progress : G.px)*TILE;
  let pyPix = (ow.moving? ow.fromY + (ow.toY-ow.fromY)*ow.progress : G.py)*TILE;
  const mapW=map.grid[0].length*TILE, mapH=map.grid.length*TILE;
  let camX = Math.round(pxPix - VW/2 + TILE/2);
  let camY = Math.round(pyPix - VH/2 + TILE/2);
  camX=clamp(camX, 0, Math.max(0,mapW-VW));
  camY=clamp(camY, 0, Math.max(0,mapH-VH));
  if(mapW<VW) camX=-(VW-mapW)/2;
  if(mapH<VH) camY=-(VH-mapH)/2;
  ow.camX=camX; ow.camY=camY;
  // Hintergrund
  CTX.fillStyle = map.indoor? '#101418':'#2a3a2a';
  CTX.fillRect(0,0,VW,VH);
  // Tiles
  const x0=Math.floor(camX/TILE), y0=Math.floor(camY/TILE);
  for(let y=y0; y<=y0+VH/TILE+1; y++){
    for(let x=x0; x<=x0+VW/TILE+1; x++){
      if(y<0||x<0||y>=map.grid.length||x>=map.grid[0].length) continue;
      const ch=map.grid[y][x];
      drawTile(ch, x*TILE-camX, y*TILE-camY, G.season, x, y);
    }
  }
  // Warps (Türen schon als Tile). NPCs zeichnen
  for(const n of (map.npcs||[])){
    // Trainer besiegt -> evtl. andere Pose, egal
    drawCharacter(n.x*TILE-camX, n.y*TILE-camY, n.dir, 0, n.palette);
  }
  // Spieler
  ow.animFrame = ow.moving? (Math.floor(ow.progress*4)%2===0?0:1) : 0;
  drawCharacter(Math.round(pxPix-camX), Math.round(pyPix-camY), G.dir, ow.animFrame, {shirt:'#d24b4b',hair:'#5a3a1a'});
  // Tag/Nacht-Overlay
  const na=map.dark?0.45:nightAmount();
  if(na>0){ CTX.fillStyle='rgba(20,24,60,'+na+')'; CTX.fillRect(0,0,VW,VH); }
  if(G.season===3 && !map.indoor){ // Schnee-Partikel im Winter
    drawSnow();
  }
  // HUD oben
  drawOwHud();
}

function wrapText(str,x,y,maxw,lh,col){
  CTX.font='8px monospace'; CTX.textBaseline='top'; CTX.fillStyle=col||'#fff';
  const words=str.split(' '); let line=''; let yy=y;
  for(const w of words){
    const test=line?line+' '+w:w;
    if(CTX.measureText(test).width>maxw){ CTX.fillText(line,x,yy); yy+=lh; line=w; }
    else line=test;
  }
  if(line) CTX.fillText(line,x,yy);
}

    const sl=Math.round((1-easeOutCubic(1-p))*VW*0.5);
    CTX.save(); CTX.globalAlpha=a;
    CTX.fillStyle='#0a0c1c'; CTX.fillRect(0,by,VW,bh);
    CTX.fillStyle='#ffe45a'; CTX.fillRect(0,by,VW,2); CTX.fillRect(0,by+bh-2,VW,2);
    CTX.fillStyle='#ff5a6a'; CTX.font='bold 22px monospace'; CTX.textBaseline='top'; CTX.textAlign='center';
    CTX.fillText('VS', VW/2 - sl, by+10);
    CTX.fillStyle='#fff'; CTX.font='12px monospace';
    CTX.fillText(battle.trainer.name, VW/2 + sl, by+15);
    CTX.textAlign='left'; CTX.restore(); CTX.globalAlpha=1;
  }
  // Info-Boxen (stabile UI)
  drawInfoBox(20,20, e, false);
  drawInfoBox(250,170, p, true);

  if(bgOnly) return;

  // Untere Box: Menü oder Nachricht
  if(battle.phase==='message'){
    drawTextBox(8,VH-72,VW-16,64);
    wrapText(battleMsgFull.substring(0,battleMsgChar), 20, VH-58, VW-40, 12, '#fff');
    if(battleMsgChar>=battleMsgFull.length && (Date.now()/400|0)%2===0){ CTX.fillStyle='#fff'; CTX.fillRect(VW-24,VH-22,6,6); }
  } else if(battle.phase==='anim'){
    // Während der Angriffs-Animation bleibt die letzte Nachricht stehen
    drawTextBox(8,VH-72,VW-16,64);
    wrapText(battleMsgFull, 20, VH-58, VW-40, 12, '#fff');
  } else if(battle.phase==='menu'){
    drawBattleMenu();
  } else if(battle.phase==='fight'){
    drawFightMenu();
  } else if(battle.phase==='party'){
    drawPartyScreen();
  } else if(battle.phase==='bag'){
    drawBattleBag();
  }
}

  drawHpBar(x+30, y+20, w-60, isPlayer? (animHp(c,true)) : (animHp(c,false)), c.maxhp);
  text('KP', x+8, y+17, '#cfe', 7);

function animHp(c, isPlayer){
  const target=c.hp;
  if(isPlayer){ battle.playerHpShown += (target-battle.playerHpShown)*0.2; if(Math.abs(target-battle.playerHpShown)<0.5)battle.playerHpShown=target; return battle.playerHpShown; }
  else { battle.enemyHpShown += (target-battle.enemyHpShown)*0.2; if(Math.abs(target-battle.enemyHpShown)<0.5)battle.enemyHpShown=target; return battle.enemyHpShown; }
}

/* =========================================================================
   UPDATE-LOGIK pro State
   ========================================================================= */
function updateTitle(){
  const opts=titleSel.opts||['Neues Spiel'];
  if(consume('up')){ titleSel.idx=(titleSel.idx-1+opts.length)%opts.length; Audio2.sfx('select'); }
  if(consume('down')){ titleSel.idx=(titleSel.idx+1)%opts.length; Audio2.sfx('select'); }
  if(consume('a')){
    Audio2.sfx('confirm');
    const choice=opts[titleSel.idx];
    if(choice==='Weiterspielen'){ const s=loadGame(); if(s){ G=s; state=STATE.OVERWORLD; Audio2.play(curMap().music||'overworld'); return; } }
    G=newGame(); state=STATE.OVERWORLD; Audio2.play(curMap().music||'town');
    openDialog(['Mutter: Guten Morgen!','Heute beginnt dein großes Abenteuer.','Professorin Farn wartet in ihrem Labor im Westen des Dorfes.'], null, 'Mutter');
  }
}
function updateStarter(){
  if(consume('left')){ starterSel.idx=(starterSel.idx+2)%3; Audio2.sfx('select'); }
  if(consume('right')){ starterSel.idx=(starterSel.idx+1)%3; Audio2.sfx('select'); }
  if(consume('a')){ Audio2.sfx('confirm'); chooseStarter(); }
}
function updateOverworld(dt){
  // Zeit voranschreiten (1 reale Sek ~ 1 Spielminute)
  G.gameMinutes += dt*1.0;
  if(G.gameMinutes>=24*60){ G.gameMinutes-=24*60; G.dayCount++; if(G.dayCount%3===0){ G.season=(G.season+1)%4; } }
  if(consume('menu')){ openMenu(); return; }
  if(consume('a')){ interact(); if(state!==STATE.OVERWORLD) return; }
  if(ow.moving){
    ow.running = Keys.b;                       // B gedrückt halten = Rennen
    ow.progress += dt*ow.speed*(ow.running?1.75:1);
    if(ow.progress>=1){ ow.progress=0; finishMove(); }
    return;
  }
  // Bewegungseingabe (gehalten)
  if(Keys.up) tryMove(0,-1,'up');
  else if(Keys.down) tryMove(0,1,'down');
  else if(Keys.left) tryMove(-1,0,'left');
  else if(Keys.right) tryMove(1,0,'right');
}
function updateDialog(){
  if(consume('a')||consume('b')){ Audio2.sfx('select'); advanceDialog(); }
}
function updateMenu(){
  if(consume('menu')||consume('b')){ Audio2.sfx('cancel'); state=STATE.OVERWORLD; return; }
  if(consume('up')){ menu.idx=(menu.idx-1+menu.items.length)%menu.items.length; Audio2.sfx('select'); }
  if(consume('down')){ menu.idx=(menu.idx+1)%menu.items.length; Audio2.sfx('select'); }
  if(consume('a')){
    Audio2.sfx('confirm');
    const sel=menu.items[menu.idx];
    if(sel==='Team'){ if(G.party.length){ partyScr.idx=0; partyScr.context='menu'; partyScr.mode='list'; state=STATE.PARTY; } }
    else if(sel==='Beutel'){ refreshBag(); bagScr.idx=0; bagScr.context='menu'; state=STATE.BAG; }
    else if(sel==='Wesen-Lexikon'){ dexScr.idx=0; state=STATE.DEX; }
    else if(sel==='Karte'){ prevState=STATE.MENU; state=STATE.MAP; }
    else if(sel==='Speichern'){ const ok=saveGame(); openDialog([ok?'Spielstand gespeichert!':'Speichern fehlgeschlagen.'], ()=>{ state=STATE.MENU; }); }
    else if(sel==='Audio'){ const on=Audio2.toggle(); openDialog(['Musik & Sound: '+(on?'AN':'AUS')], ()=>{ state=STATE.MENU; }); }
    else if(sel==='Zurück'){ state=STATE.OVERWORLD; }
  }
}
function updateParty(){
  const inBattle=(state===STATE.BATTLE)|| (battle.active && battle.phase==='party');
  // Wenn im Kampf, state ist BATTLE aber phase party. Behandeln separat in updateBattle.
  if(consume('b')){ if(!partyScr.detail){ Audio2.sfx('cancel'); state=STATE.MENU; return; } else { partyScr.detail=false; return; } }
  if(consume('up')){ partyScr.idx=(partyScr.idx-1+G.party.length)%G.party.length; Audio2.sfx('select'); }
  if(consume('down')){ partyScr.idx=(partyScr.idx+1)%G.party.length; Audio2.sfx('select'); }
  if(consume('a')){ Audio2.sfx('select'); partyScr.detail=!partyScr.detail; }
}
function updateBag(){
  refreshBag();
  if(consume('b')){ Audio2.sfx('cancel'); state=STATE.MENU; return; }
  if(bagScr.items.length===0) return;
  if(consume('up')){ bagScr.idx=(bagScr.idx-1+bagScr.items.length)%bagScr.items.length; Audio2.sfx('select'); }
  if(consume('down')){ bagScr.idx=(bagScr.idx+1)%bagScr.items.length; Audio2.sfx('select'); }
  if(consume('a')){
    const k=bagScr.items[bagScr.idx]; const it=ITEMS[k];
    if(it.kind==='ball'){ openDialog(['Fangkugeln kannst du nur im Kampf werfen!'], ()=>{ state=STATE.BAG; }); return; }
    // Item auf Team anwenden -> Party-Auswahl
    bagScr.useItem=k; partyScr.idx=0; partyScr.context='useitem'; partyScr.mode='list';
    state=STATE.PARTY; partyScr.applyItem=true;
  }
  // Item-Anwendung im Party-Screen
}
function updateDex(){
  if(consume('b')){ Audio2.sfx('cancel'); state=STATE.MENU; return; }
  if(consume('up')){ dexScr.idx=(dexScr.idx-1+SPECIES_LIST.length)%SPECIES_LIST.length; Audio2.sfx('select'); }
  if(consume('down')){ dexScr.idx=(dexScr.idx+1)%SPECIES_LIST.length; Audio2.sfx('select'); }
}
function updateMapScr(){
  if(consume('b')||consume('menu')){ Audio2.sfx('cancel'); state=prevState; }
}
function updateShop(){
  if(shopScr.mode==='qty'){
    const it=ITEMS[shopScr.stock[shopScr.idx]];
    if(consume('up')){ shopScr.qty=Math.min(99,shopScr.qty+1); Audio2.sfx('select'); }
    if(consume('down')){ shopScr.qty=Math.max(1,shopScr.qty-1); Audio2.sfx('select'); }
    if(consume('b')){ shopScr.mode='list'; Audio2.sfx('cancel'); }
    if(consume('a')){
      const total=shopScr.qty*it.price;
      if(G.money>=total){ G.money-=total; const k=shopScr.stock[shopScr.idx]; G.bag[k]=(G.bag[k]||0)+shopScr.qty; Audio2.sfx('confirm'); shopScr.mode='list';
        openDialog([shopScr.qty+'x '+it.name+' gekauft!'], ()=>{ state=STATE.SHOP; }); }
      else { Audio2.sfx('cancel'); openDialog(['Du hast nicht genug Velar!'], ()=>{ state=STATE.SHOP; }); }
    }
    return;
  }
  if(consume('b')){ Audio2.sfx('cancel'); state=STATE.OVERWORLD; Audio2.play(curMap().music); return; }
  if(consume('up')){ shopScr.idx=(shopScr.idx-1+shopScr.stock.length)%shopScr.stock.length; Audio2.sfx('select'); }
  if(consume('down')){ shopScr.idx=(shopScr.idx+1)%shopScr.stock.length; Audio2.sfx('select'); }
  if(consume('a')){ shopScr.mode='qty'; shopScr.qty=1; Audio2.sfx('select'); }
}
function updateEvolve(){
  if(consume('a')||consume('b')){ if(evo.t>1.2){ Audio2.sfx('confirm'); finishEvolution(); } }
}

/* KAMPF-UPDATE */
function updateBattle(){
  if(battle.phase==='message'){
    if(consume('a')||consume('b')){ battleMsgAdvance(); }
    return;
  }
  if(battle.phase==='menu'){
    if(consume('left')&&battle.cursor%2===1){ battle.cursor--; Audio2.sfx('select'); }
    else if(consume('right')&&battle.cursor%2===0){ battle.cursor++; Audio2.sfx('select'); }
    else if(consume('up')&&battle.cursor>=2){ battle.cursor-=2; Audio2.sfx('select'); }
    else if(consume('down')&&battle.cursor<2){ battle.cursor+=2; Audio2.sfx('select'); }
    if(consume('a')){
      Audio2.sfx('confirm');
      if(battle.cursor===0){ battle.phase='fight'; battle.cursor=0; }
      else if(battle.cursor===1){ battle.phase='bag'; refreshBag(); bagScr.idx=0; }
      else if(battle.cursor===2){ battle.phase='party'; partyScr.idx=0; partyScr.context='battle'; battle.mustSwitch=false; }
      else if(battle.cursor===3){ execTurn({type:'run'}); }
    }
    return;
  }
  if(battle.phase==='fight'){
    const p=battle.player;
    if(consume('b')){ Audio2.sfx('cancel'); battle.phase='menu'; battle.cursor=0; return; }
    const n=p.moves.length;
    if(consume('left')&&battle.cursor%2===1){ battle.cursor--; Audio2.sfx('select'); }
    else if(consume('right')&&battle.cursor%2===0&&battle.cursor+1<n){ battle.cursor++; Audio2.sfx('select'); }
    else if(consume('up')&&battle.cursor>=2){ battle.cursor-=2; Audio2.sfx('select'); }
    else if(consume('down')&&battle.cursor+2<n){ battle.cursor+=2; Audio2.sfx('select'); }
    if(consume('a')){
      const mv=p.moves[battle.cursor];
      if(mv && mv.pp>0){ Audio2.sfx('confirm'); execTurn({type:'move', move:mv}); }
      else if(mv){ openDialogInBattle('Keine AP mehr für diese Attacke!'); }
    }
    return;
  }
  if(battle.phase==='bag'){
    refreshBag();
    if(consume('b')){ Audio2.sfx('cancel'); battle.phase='menu'; battle.cursor=0; return; }
    const list=bagScr.items;
    if(list.length===0) return;
    if(consume('up')){ bagScr.idx=(bagScr.idx-1+list.length)%list.length; Audio2.sfx('select'); }
    if(consume('down')){ bagScr.idx=(bagScr.idx+1)%list.length; Audio2.sfx('select'); }
    if(consume('a')){
      const k=list[bagScr.idx]; const it=ITEMS[k]; Audio2.sfx('confirm');
      if(it.kind==='ball'){ battle._ballKey=k; execTurn({type:'catch'}); }
      else {
        // Ziel = aktives Wesen (vereinfachte Anwendung im Kampf)
        const c=battle.player;
        if(it.kind==='heal' && c.hp>=c.maxhp){ openDialogInBattle(c.name+' hat schon volle KP!'); return; }
        if(it.kind==='revive' && c.hp>0){ openDialogInBattle(c.name+' ist nicht besiegt!'); return; }
        if(it.kind==='cure' && c.status!==it.cure){ openDialogInBattle('Es zeigt keine Wirkung.'); return; }
        execTurn({type:'item', item:k, itemName:it.name, target:c});
      }
    }
    return;
  }
  if(battle.phase==='party'){
    if(consume('up')){ partyScr.idx=(partyScr.idx-1+G.party.length)%G.party.length; Audio2.sfx('select'); }
    if(consume('down')){ partyScr.idx=(partyScr.idx+1)%G.party.length; Audio2.sfx('select'); }
    if(consume('b') && !battle.mustSwitch){ Audio2.sfx('cancel'); battle.phase='menu'; battle.cursor=0; return; }
    if(consume('a')){
      const c=G.party[partyScr.idx];
      if(c.hp<=0){ openDialogInBattle(c.name+' kann nicht kämpfen!'); return; }
      if(c===battle.player){ openDialogInBattle(c.name+' ist bereits im Kampf!'); return; }
      Audio2.sfx('confirm');
      if(battle.mustSwitch){ battle.mustSwitch=false; battle.player=c; battle.playerHpShown=c.hp; bfxEntry('player'); battleMsg(['Los, '+c.name+'!'], ()=>{ battle.phase='menu'; battle.cursor=0; }); }
      else { execTurn({type:'switch', idx:partyScr.idx}); }
    }
    return;
  }
}
function openDialogInBattle(msg){ const back=battle.phase; battleMsg([msg], ()=>{ battle.phase=back; }); }

/* =========================================================================
   HAUPTSCHLEIFE
   ========================================================================= */
let lastT=performance.now();
function loop(now){
  let dt=(now-lastT)/1000; lastT=now; if(dt>0.1)dt=0.1;
  // Warten, bis alle Grafiken geladen sind (Ladebalken)
  if(!assetsReady()){ clearPressed(); drawLoading(); requestAnimationFrame(loop); return; }
  // Update
  switch(state){
    case STATE.TITLE: updateTitle(); break;
    case STATE.STARTER: updateStarter(); break;
    case STATE.OVERWORLD: updateOverworld(dt); break;
    case STATE.DIALOG: updateDialog(); break;
    case STATE.MENU: updateMenu(); break;
    case STATE.PARTY: updateParty(); break;
    case STATE.BAG: updateBag(); break;
    case STATE.DEX: updateDex(); break;
    case STATE.MAP: updateMapScr(); break;
    case STATE.SHOP: updateShop(); break;
    case STATE.BATTLE: updateBattle(); break;
    case STATE.EVOLVE: updateEvolve(); break;
  }
  // Kampf-Animationen weiterlaufen lassen (auch während Textphasen)
  if(state===STATE.BATTLE||state===STATE.EVOLVE) updateBFX(dt);
  // Getaktete Animationsphase herunterzählen und danach fortsetzen
  if(state===STATE.BATTLE && battle.phase==='anim'){
    battle.animTime-=dt;
    if(battle.animTime<=0){ const cb=battle.animCb; battle.animCb=null; battle.phase='exec'; if(cb)cb(); }
  }
  // Party-Screen Item-Anwendung (aus Beutel im Overworld)
  if(state===STATE.PARTY && partyScr.applyItem){ handlePartyItemApply(); }
  clearPressed();
  // Render
  CTX.fillStyle='#000'; CTX.fillRect(0,0,VW,VH);
  switch(state){
    case STATE.TITLE: drawTitle(); break;
    case STATE.STARTER: drawStarter(); break;
    case STATE.OVERWORLD: drawOverworld(); break;
    case STATE.DIALOG: drawDialog(); break;
    case STATE.MENU: drawMenu(); break;
    case STATE.PARTY: drawPartyDetailOrList(); break;
    case STATE.BAG: drawBag(); break;
    case STATE.DEX: drawDex(); break;
    case STATE.MAP: drawMap(); break;
    case STATE.SHOP: drawShop(); break;
    case STATE.BATTLE: drawBattle(false); break;
    case STATE.EVOLVE: drawEvolve(); break;
  }
  // Dialog-Text-Tippen
  if(state===STATE.DIALOG && dlg.charIdx<dlg.full.length){ dlg.charTimer+=dt; if(dlg.charTimer>0.02){ dlg.charTimer=0; dlg.charIdx+=2; if(dlg.charIdx>dlg.full.length)dlg.charIdx=dlg.full.length; } }
  if(state===STATE.BATTLE && battle.phase==='message' && battleMsgChar<battleMsgFull.length){ battleMsgTimer+=dt; if(battleMsgTimer>0.02){ battleMsgTimer=0; battleMsgChar+=2; if(battleMsgChar>battleMsgFull.length)battleMsgChar=battleMsgFull.length; } }
  requestAnimationFrame(loop);
}

function handlePartyItemApply(){
  // erfolgt im updateParty? Wir bauen eigene Logik:
}
function drawPartyDetailOrList(){
  if(partyScr.detail && G.party[partyScr.idx]){ drawPartyDetail(G.party[partyScr.idx]); }
  else drawPartyScreen();
}
function drawPartyDetail(c){
  CTX.fillStyle='#243a52'; CTX.fillRect(0,0,VW,VH);
  const sp=SPECIES[c.species];
  CTX.fillStyle=TYPE_COLORS[sp.type]; CTX.fillRect(0,0,VW,30);
  text(c.name+'  Lv'+c.level, 16, 8, '#fff', 14);
  text(sp.type, VW-80, 10, '#fff', 11);
  drawCreature(c.species, 40, 50, 80, false);
  // Statuswerte
  text('KP   '+c.hp+' / '+c.maxhp, 160, 50, '#fff', 10);
  drawHpBar(160, 64, 200, c.hp, c.maxhp);
  text('Angriff      '+c.stats.atk, 160, 80, '#cde', 10);
  text('Verteidigung '+c.stats.def, 160, 96, '#cde', 10);
  text('Tempo        '+c.stats.spd, 160, 112, '#cde', 10);
  const need=expForLevel(c.level+1)-expForLevel(c.level), cur=c.exp-expForLevel(c.level);
  text('E-Punkte bis Lv'+(c.level+1)+': '+(need-cur), 160, 128, '#9ce', 8);
  // Attacken
  text('Attacken:', 40, 150, '#ffe', 10);
  for(let i=0;i<c.moves.length;i++){
    const mv=c.moves[i]; const m=MOVES[mv.key]; const y=168+i*24;
    CTX.fillStyle='#1a2838'; CTX.fillRect(40,y,VW-80,20);
    CTX.fillStyle=TYPE_COLORS[m.type]; CTX.fillRect(40,y,4,20);
    text(m.name, 50, y+5, '#fff', 9);
    text(m.type, 200, y+5, TYPE_COLORS[m.type], 8);
    text('Stärke '+(m.power||'—'), 290, y+5, '#cde', 8);
    text('AP '+mv.pp+'/'+mv.maxpp, 390, y+5, '#cde', 8);
  }
  if(c.status){ text('Status: '+{gift:'Vergiftet',paralyse:'Paralysiert',schlaf:'Schläft'}[c.status], 40, 280, '#e0a040', 9); }
  textC('B: Zurück', VW/2, VH-12, '#9ab', 8);
}

/* Item aus Beutel auf gewähltes Party-Wesen anwenden */
(function patchPartyItem(){
  const origUpdateParty = updateParty;
  updateParty = function(){
    if(partyScr.applyItem){
      if(consume('b')){ Audio2.sfx('cancel'); partyScr.applyItem=false; state=STATE.BAG; return; }
      if(consume('up')){ partyScr.idx=(partyScr.idx-1+G.party.length)%G.party.length; Audio2.sfx('select'); }
      if(consume('down')){ partyScr.idx=(partyScr.idx+1)%G.party.length; Audio2.sfx('select'); }
      if(consume('a')){
        const k=bagScr.useItem; const it=ITEMS[k]; const c=G.party[partyScr.idx];
        let line='', ok=false;
        if(it.kind==='heal'){ if(c.hp<c.maxhp && c.hp>0){ const b=c.hp; c.hp=Math.min(c.maxhp,c.hp+it.amount); line=c.name+' um '+(c.hp-b)+' KP geheilt!'; ok=true; } else line='Keine Wirkung.'; }
        else if(it.kind==='revive'){ if(c.hp<=0){ c.hp=Math.floor(c.maxhp*it.amount); c.status=null; line=c.name+' wiederbelebt!'; ok=true; } else line='Keine Wirkung.'; }
        else if(it.kind==='cure'){ if(c.status===it.cure){ c.status=null; c.sleepTurns=0; line=c.name+' geheilt!'; ok=true; } else line='Keine Wirkung.'; }
        if(ok){ G.bag[k]--; if(G.bag[k]<=0)delete G.bag[k]; Audio2.sfx('heal'); }
        partyScr.applyItem=false;
        openDialog([line], ()=>{ refreshBag(); if(bagScr.items.length){ bagScr.idx=Math.min(bagScr.idx,bagScr.items.length-1); state=STATE.BAG; } else state=STATE.MENU; });
      }
      return;
    }
    origUpdateParty();
  };
})();

/* Start */
state=STATE.TITLE;
loadAllAssets();
Audio2.play('town');
requestAnimationFrame(loop);
