<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a18" />
    <meta name="color-scheme" content="dark light" />
    <meta name="referrer" content="no-referrer" />

    <!-- Content Security Policy. GitHub Pages can't send HTTP headers, so we set a
         baseline CSP via meta: scripts only from us + the optional analytics/Stripe
         hosts, no <object>/<embed>, no base-tag hijack. img/connect stay https:-wide
         so the many card-image CDNs and the (per-project) Supabase/analytics
         endpoints keep working. NB: frame-ancestors / X-Frame-Options need a real
         header — set those at the CDN/custom-domain layer for clickjacking cover. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; manifest-src 'self'; worker-src 'self'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://plausible.io https://gc.zgo.at https://js.stripe.com; connect-src 'self' https:; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com;"
    />

    <!-- Perf: warm up connections to the image hosts hit on first paint. -->
    <link rel="preconnect" href="https://wsrv.nl" crossorigin />
    <link rel="preconnect" href="https://images.pokemontcg.io" crossorigin />
    <link rel="dns-prefetch" href="https://cards.scryfall.io" />
    <link rel="dns-prefetch" href="https://images.ygoprodeck.com" />
    <link rel="dns-prefetch" href="https://en.onepiece-cardgame.com" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cartograph" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 viewBox%3D%220 0 64 64%22%3E%3Crect width%3D%2264%22 height%3D%2264%22 rx%3D%2214%22 fill%3D%22%23120820%22%2F%3E%3Cg transform%3D%22rotate(-7 32 32)%22%3E%3Crect x%3D%2219%22 y%3D%2212%22 width%3D%2230%22 height%3D%2240%22 rx%3D%226%22 fill%3D%22%23171733%22 stroke%3D%22%23ffb300%22 stroke-width%3D%222.2%22%2F%3E%3Cpath d%3D%22M24 45 L31 39 L36 42 L43 30 L49 24 M43.2 25 L49 24 L47.3 29.6%22 fill%3D%22none%22 stroke%3D%22%23ffd24d%22 stroke-width%3D%222.6%22 stroke-linecap%3D%22round%22 stroke-linejoin%3D%22round%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E"
    />
    <meta
      name="description"
      content="Cartograph – Live-Preistracker für Sammelkarten (Pokémon, Magic, One Piece, Yu-Gi-Oh!) mit Fokus auf den europäischen Markt (Cardmarket EU): Preisentwicklung, Charts, Investment-Score, Sammlung & Portfolio."
    />
