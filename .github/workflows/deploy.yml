name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/pensive-euler-SFLHH]
  schedule:
    - cron: '0 5 * * *' # daily 05:00 UTC: rebuild with fresh prices
  workflow_dispatch:

permissions:
  contents: write # commit the incrementally-grown card snapshot back to the repo
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch live Cardmarket prices (server-side, no CORS)
        run: node scripts/fetch-prices.mjs
        env:
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
          # Optional: official Cardmarket (MKM) API. If these 4 secrets are set,
          # real MKM products are merged into the snapshot; otherwise it no-ops.
          CM_APP_TOKEN: ${{ secrets.CM_APP_TOKEN }}
          CM_APP_SECRET: ${{ secrets.CM_APP_SECRET }}
          CM_ACCESS_TOKEN: ${{ secrets.CM_ACCESS_TOKEN }}
          CM_ACCESS_SECRET: ${{ secrets.CM_ACCESS_SECRET }}
          CM_GAME_ID: ${{ vars.CM_GAME_ID }}
          CM_SEARCH: ${{ vars.CM_SEARCH }}
      - name: Build One Piece catalogue (all sets/cards + official art, server-side)
        run: node scripts/fetch-onepiece.mjs
        env:
          # Same official Cardmarket (MKM) credentials as Pokémon. When set, real
          # MKM prices replace the estimate on matched One Piece cards; otherwise
          # the build keeps the transparent estimate. The One Piece idGame is
          # auto-resolved from MKM /games (override with CM_GAME_ID_ONEPIECE).
          CM_APP_TOKEN: ${{ secrets.CM_APP_TOKEN }}
          CM_APP_SECRET: ${{ secrets.CM_APP_SECRET }}
          CM_ACCESS_TOKEN: ${{ secrets.CM_ACCESS_TOKEN }}
          CM_ACCESS_SECRET: ${{ secrets.CM_ACCESS_SECRET }}
          CM_GAME_ID_ONEPIECE: ${{ vars.CM_GAME_ID_ONEPIECE }}
          CM_SEARCH_ONEPIECE: ${{ vars.CM_SEARCH_ONEPIECE }}
      - name: Build Yu-Gi-Oh! catalogue (all sets/cards + official art, server-side)
        run: node scripts/fetch-yugioh.mjs
      - name: Build Magic catalogue (Scryfall, real Cardmarket EUR prices)
        run: node scripts/fetch-magic.mjs
      - name: Smoke-test catalogues (non-blocking — surfaces empty/broken data)
        continue-on-error: true
        run: node scripts/smoke-data.mjs
      - name: Persist grown card snapshots (incremental)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true # branch protection etc. must not break the deploy
        run: |
          if [ -n "$(git status --porcelain public/data/*.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data/cards.json public/data/onepiece.json public/data/yugioh.json public/data/magic.json
            git commit -m "data: refresh card snapshots [skip ci]"
            git push
          else
            echo "card snapshots unchanged this run"
          fi
      - run: npm run build
        # Build-time config (Supabase URL + anon key; later Stripe/live-prices) is
        # read from the committed .env.production — every value there is public-safe
        # (anon key is RLS-protected). Real secrets live only in Supabase function
        # secrets, never here.
      - name: Build Beastlings Quest into /creature-quest subpath
        # Eigenständiges Spielprojekt (React + Vite, base './'), wird unter
        # <pages>/creature-quest/ ausgeliefert, ohne die Karten-App zu berühren.
        run: |
          cd creature-quest
          npm ci
          node scripts/download-sprites.mjs
          npm run build
          mkdir -p ../dist/creature-quest
          cp -r dist/* ../dist/creature-quest/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
